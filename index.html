<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruleta de Emociones</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:white;
    font-family:Arial, sans-serif;
}

.pointer{
    font-size:40px;
    color:#7EC8E3;
    margin-bottom:-15px;
    z-index:10;
}

#wheel{
    width:750px;
    max-width:90vw;
    transition:transform 5s ease-out;
}

button{
    margin-top:8px;
    padding:12px 25px;
    font-size:18px;
    font-weight:900;
    color:black;
    background-color:#7EC8E3;
    border:none;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.15);
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="pointer">▼</div>

<img id="wheel" src="rueda1.png" alt="Ruleta de Emociones">

<button onclick="spinWheel()">
    Girar
</button>

<script>

let currentRotation = 0;
let spinning = false;

function spinWheel(){

    if(spinning) return;

    spinning = true;

    const randomAngle = Math.floor(Math.random() * 360);

    currentRotation += (360 * 5) + randomAngle;

    document.getElementById("wheel").style.transform =
        `rotate(${currentRotation}deg)`;

    setTimeout(() => {
        spinning = false;
    }, 5000);

}

</script>

</body>
</html>
